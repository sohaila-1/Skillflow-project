version: '3.9'

services:
  postgres:
    image: postgres:16.3-alpine
    container_name: skillflow-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillflow}
      POSTGRES_DB: ${POSTGRES_DB:-skillflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: skillflow-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-skillflow}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-skillflow}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_FRONTEND_URL: http://localhost:8080
    volumes:
      - ./keycloak-realm:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./skillflow/backend
      target: development
    container_name: skillflow-backend
    ports:
      - "3000:3000"
    env_file: ./skillflow/backend/.env
    environment:
      DATABASE_URL: postgresql://skillflow:skillflow@postgres:5432/skillflow
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: http://localhost:8080
      KEYCLOAK_FRONTEND_CLIENT_ID: skillflow-frontend
      FRONTEND_URL: http://localhost:4000
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    volumes:
      - ./skillflow/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ./skillflow/frontend
      target: development
    container_name: skillflow-frontend
    ports:
      - "4000:4000"
    env_file: ./skillflow/frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/v1
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: skillflow
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: skillflow-frontend
    volumes:
      - ./skillflow/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  worker:
    build:
      context: ./skillflow/worker
      target: development
    container_name: skillflow-worker
    env_file: ./skillflow/worker/.env
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    volumes:
      - ./skillflow/worker:/app
      - /app/node_modules
    depends_on:
      - backend

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: skillflow-pubsub
    command: ["gcloud", "beta", "emulators", "pubsub", "start", "--host-port=0.0.0.0:8085", "--project=skillflow-local"]
    ports:
      - "8085:8085"

  mailpit:
    image: axllent/mailpit:latest
    container_name: skillflow-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
