name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths: ['skillflow/backend/**']
  pull_request:
    branches: [main]
    paths: ['skillflow/backend/**']
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skillflow/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: skillflow/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npx eslint "{src,test}/**/*.ts" --max-warnings 0

      - name: Unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Build
        run: npm run build

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sohaila01
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./skillflow/backend
          target: production
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            sohaila01/skillflow-backend:latest
            sohaila01/skillflow-backend:${{ github.sha }}
